name: Deploy VidhanSabha to Plesk

on:
  push:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '22.15.0'

jobs:

  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── BUILD ANGULAR ────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./Frontend/package-lock.json

      - name: Install Angular dependencies
        run: npm ci
        working-directory: ./Frontend

      - name: Build Angular app
        run: npm run build -- --configuration production
        working-directory: ./Frontend

      # ── COPY ANGULAR TO WWWROOT ──────────────────────────────────
      - name: Copy Angular build to backend wwwroot
        run: |
          rm -rf ./Backened/VidhanSabha.Api/wwwroot
          mkdir -p ./Backened/VidhanSabha.Api/wwwroot
          cp -r ./Frontend/dist/vidhan-sabha/browser/* ./Backened/VidhanSabha.Api/wwwroot/

      # ── BUILD & PUBLISH BACKEND ──────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ./Backened/VidhanSabha.slnx

      - name: Build solution
        run: dotnet build ./Backened/VidhanSabha.slnx --configuration Release --no-restore

      - name: Publish API
        run: dotnet publish ./Backened/VidhanSabha.Api/VidhanSabha.Api.csproj --configuration Release --output ./backend-publish

      # ── STEP 1: STOP APP VIA CURL ────────────────────────────────
      - name: Upload app_offline.htm to stop IIS
        run: |
          echo "<html><body>Deploying update please wait...</body></html>" > /tmp/app_offline.htm
          curl -T /tmp/app_offline.htm ftp://${{ secrets.PLESK_HOST }}/httpdocs/app_offline.htm \
            --user "${{ secrets.PLESK_USERNAME }}:${{ secrets.PLESK_PASSWORD }}" \
            --ftp-create-dirs \
            --connect-timeout 30 \
            --max-time 60

      # ── STEP 2: WAIT FOR IIS TO RELEASE FILES ────────────────────
      - name: Wait for app to stop
        run: sleep 8

      # ── STEP 3: DEPLOY BACKEND FILES ─────────────────────────────
      - name: Deploy Backend files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.PLESK_USERNAME }}
          password: ${{ secrets.PLESK_PASSWORD }}
          local-dir: ./backend-publish/
          server-dir: /httpdocs/
          dangerous-clean-slate: false
          exclude: |
            **/wwwroot/**
            **/uploads/**
            **/logs/**

      # ── STEP 4: DEPLOY FRONTEND FILES ────────────────────────────
      - name: Deploy Frontend files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.PLESK_USERNAME }}
          password: ${{ secrets.PLESK_PASSWORD }}
          local-dir: ./backend-publish/wwwroot/
          server-dir: /httpdocs/wwwroot/
          dangerous-clean-slate: true
          exclude: |
            **/uploads/**

      # ── STEP 5: REMOVE app_offline.htm TO RESTART APP ────────────
      - name: Remove app_offline.htm to restart IIS
        run: |
          sudo apt-get install -y lftp
          lftp -c "open -u ${{ secrets.PLESK_USERNAME }},${{ secrets.PLESK_PASSWORD }} ftp://${{ secrets.PLESK_HOST }}; rm /httpdocs/app_offline.htm"
