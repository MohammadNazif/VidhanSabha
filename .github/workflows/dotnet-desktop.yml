name: Deploy VidhanSabha to Plesk

on:
  push:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '22.15.0'

jobs:

  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── BUILD ANGULAR FIRST ──────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./Frontend/package-lock.json

      - name: Install Angular dependencies
        run: npm ci
        working-directory: ./Frontend

      - name: Build Angular app
        run: npm run build -- --configuration production
        working-directory: ./Frontend

      # ── COPY ANGULAR OUTPUT TO BACKEND WWWROOT ───────────────────
      - name: Copy Angular build to backend wwwroot
        run: |
          rm -rf ./Backened/VidhanSabha.Api/wwwroot
          mkdir -p ./Backened/VidhanSabha.Api/wwwroot
          cp -r ./Frontend/dist/vidhan-sabha/* ./Backened/VidhanSabha.Api/wwwroot/

      # ── BUILD & PUBLISH BACKEND ──────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ./Backened/VidhanSabha.slnx

      - name: Build solution
        run: dotnet build ./Backened/VidhanSabha.slnx --configuration Release --no-restore

      - name: Publish API
        run: dotnet publish ./Backened/VidhanSabha.Api/VidhanSabha.Api.csproj --configuration Release --output ./backend-publish

      # ── DEPLOY TO PLESK ──────────────────────────────────────────
      - name: Deploy to Plesk via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.PLESK_USERNAME }}
          password: ${{ secrets.PLESK_PASSWORD }}
          local-dir: ./backend-publish/
          server-dir: /httpdocs/
          dangerous-clean-slate: true
          exclude: |
            **/uploads/**
            **/logs/**
