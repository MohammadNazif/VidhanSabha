name: Deploy VidhanSabha to Plesk

on:
  push:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '22.15.0'

jobs:

  # ── DEPLOY BACKEND ─────────────────────────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ./Backened/VidhanSabha.slnx

      - name: Build solution
        run: dotnet build ./Backened/VidhanSabha.slnx --configuration Release --no-restore

      - name: Publish API
        run: dotnet publish ./Backened/VidhanSabha.Api/VidhanSabha.Api.csproj --configuration Release --output ./backend-publish

      - name: Deploy Backend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.PLESK_USERNAME }}
          password: ${{ secrets.PLESK_PASSWORD }}
          local-dir: ./backend-publish/
          server-dir: ${{ secrets.BACKEND_REMOTE_PATH }}/

  # ── DEPLOY FRONTEND ────────────────────────────────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./Frontend

      - name: Build Angular app
        run: npm run build -- --configuration production
        working-directory: ./Frontend

      - name: Deploy Frontend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.PLESK_USERNAME }}
          password: ${{ secrets.PLESK_PASSWORD }}
          local-dir: ./Frontend/dist/vidhan-sabha/
          server-dir: ${{ secrets.FRONTEND_REMOTE_PATH }}
          dangerous-clean-slate: true        
          exclude: |
            **/uploads/**
            **/logs/**
