<div class="flex min-h-screen bg-[#f8fafc]">
  <!-- Mobile Sidebar Backdrop Overlay -->
  <div *ngIf="isMobile && !sidebarCollapsed && !isLoginPage" 
       class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40 transition-opacity"
       (click)="sidebarCollapsed = true">
  </div>

  <!-- Sidebar -->
  <app-sidebar *ngIf="!isLoginPage"
    [isMobile]="isMobile"
    [collapsed]="sidebarCollapsed" 
    (collapsedChange)="onSidebarToggle($event)">
  </app-sidebar>

  <!-- Main Content -->
  <main
    class="flex-1 w-full transition-all duration-300 ease-in-out min-w-0 relative"
    [style.margin-left]="(isLoginPage || isMobile) ? '0' : (sidebarCollapsed ? '78px' : '260px')"
  >
    <!-- Mobile Hamburger Menu (Visible only on small screens) -->
    <button *ngIf="isMobile && sidebarCollapsed && !isLoginPage" 
            (click)="sidebarCollapsed = false"
            class="fixed top-4 right-4 z-40 bg-white/80 backdrop-blur-md p-2 rounded-xl shadow-lg border border-slate-200 text-slate-700 hover:bg-white hover:text-blue-600 transition-all cursor-pointer">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>

    <router-outlet />
  </main>

  <!-- Global Loader -->
  <app-loader [show]="(loaderService.isLoading$ | async) ?? false"></app-loader>
  
  <!-- Global Toaster -->
  <app-toast></app-toast>
</div>
