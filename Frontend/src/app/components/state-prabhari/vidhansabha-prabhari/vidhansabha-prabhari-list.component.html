<div class="h-screen p-6 flex flex-col overflow-hidden bg-slate-50/50">
    <app-page-header [title]="listTitle" subtitle="Manage and track constituency-level leaders" icon="users">
        <div class="flex items-center gap-3">
            <app-generic-export *ngIf="isListMode" [data]="prabhariList" [columns]="columns"
                fileName="VidhanSabhaPrabharis">
            </app-generic-export>

            <app-generic-modal-button *ngIf="!isListMode" #prabhariModal [config]="addPrabhariConfig" variant="primary"
                icon="+" label="Add Vidhansabha Prabhari" (formSubmit)="handleFormSubmit($event)">
            </app-generic-modal-button>
        </div>
    </app-page-header>

    <div class="flex-1 min-h-0 mt-6 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
        <app-generic-table 
            class="flex-1 min-h-0" 
            [data]="prabhariList" 
            [columns]="columns" 
            [actions]="actions" 
            [config]="config"
            [loading]="loading" 
            [totalItems]="totalCount" 
            (pageChange)="handlePageChange($event)"
            (sortChange)="handleSortChange($event)" 
            (searchChange)="handleSearchChange($event)"
            (actionClick)="handleAction($event)">
        </app-generic-table>
    </div>
</div>
