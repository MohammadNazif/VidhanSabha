<div class="h-screen p-6 flex flex-col overflow-hidden bg-slate-50/50">
    <app-page-header [title]="listTitle" subtitle="Manage state level committee members and their details"
        icon="users">

        <div class="flex items-center gap-3">
            <app-generic-export *ngIf="isListMode" [data]="memberList" [columns]="columns" fileName="SamitiMembers">
            </app-generic-export>

            <app-generic-modal-button *ngIf="!isListMode" #memberModal [config]="formConfig" (formSubmit)="handleFormSubmit($event)"
                label="Add Member" icon="+" variant="primary">
            </app-generic-modal-button>
        </div>
    </app-page-header>

    <div
        class="flex-1 min-h-0 mt-6 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
        <app-generic-table class="flex-1 min-h-0" [data]="memberList" [columns]="columns" [config]="config"
            [actions]="actions" [totalItems]="totalCount" [loading]="loading" (pageChange)="handlePageChange($event)"
            (sortChange)="handleSortChange($event)" (searchChange)="handleSearchChange($event)"
            (actionClick)="handleAction($event)">
        </app-generic-table>
    </div>
</div>
