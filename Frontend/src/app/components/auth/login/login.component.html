<div class="min-h-screen w-full flex items-center justify-center relative font-['Inter'] px-6 py-10">

  <div class="absolute inset-0 z-0 bg-cover bg-[center_top_40%] bg-no-repeat scale-110"
    style="background-image: url('/vidhan_sabha_background.png');">
  </div>

  <div class="absolute  inset-0 z-10 bg-black/35 backdrop-brightness-90"></div>

  <div
    class="relative z-20 w-full max-w-[630px] h-auto md:h-[380px] flex flex-col md:flex-row rounded-3xl overflow-hidden shadow-2xl border border-white/20 backdrop-blur-[8px]">

    <div
      class="w-full md:w-[45%] flex flex-col justify-center items-center py-10
      bg-gradient-to-b from-blue-700/60 to-indigo-900/80 text-white text-center md:border-r border-b md:border-b-0 border-white/10 relative overflow-hidden">

      <div class="absolute -top-10 -right-10 w-40 h-40 bg-white/10 rounded-full blur-3xl opacity-50"></div>
      <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-blue-400/20 rounded-full blur-3xl opacity-50"></div>

      <div class="relative mb-8 group hidden md:flex">
        <div class="absolute inset-0 w-full h-full rounded-full bg-blue-400 opacity-30 group-hover:animate-none">
        </div>
        <div class="absolute inset-0 w-full h-full rounded-full bg-blue-500 opacity-20 animate-pulse delay-75"></div>

        <div
          class="relative w-24 h-24 bg-white/10 backdrop-blur-lg rounded-full flex items-center justify-center shadow-2xl border border-white/20 p-3">
          <img src="pngegg.png" alt="Ashoka Stambh" />
        </div>
      </div>

      <div class="space-y-4 relative z-10">
        <div>
          <h2
            class="text-3xl font-extrabold tracking-tighter leading-none bg-clip-text text-transparent bg-gradient-to-b from-white to-blue-100">
            Vidhan Sabha
          </h2>
          <div class="h-1 w-10 bg-blue-400 mx-auto mt-3 rounded-full shadow-lg shadow-blue-400/50"></div>
        </div>

        <h3 class="text-xs font-semibold uppercase tracking-[0.3em] text-blue-100/90 pt-1">
          Legislative Ecosystem
        </h3>

        <p class="text-[12px] text-white/70 leading-relaxed px-2 font-medium hidden md:block">
          Empowering governance through secure, unified digital management.
        </p>
      </div>

      <div class="mt-12 opacity-60 hidden md:block">
        <p class="text-[9px] uppercase tracking-widest text-white/50">Government of India</p>
      </div>
    </div>

    <div class="w-full md:w-[55%] bg-white/10 p-8 md:p-10 flex flex-col justify-center">

      <div class="mb-8">
        <h2 class="text-2xl font-bold text-white tracking-tight">System Access</h2>
        <p class="text-xs text-white/60">Enter authorized credentials</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onLogin($event)" class="space-y-5">

        <div class="group relative">
          <input type="text" formControlName="mobileNumber"
            class="w-full px-4 py-3 bg-black/10 border border-white/10 rounded-xl text-white text-sm focus:outline-none focus:ring-2 focus:ring-white/30 transition-all placeholder:text-white/30"
            placeholder="Mobile Number">
          <div *ngIf="loginForm.get('mobileNumber')?.invalid && loginForm.get('mobileNumber')?.touched"
            class="text-red-400 text-xs mt-1">
            Enter a valid 10-digit mobile number
          </div>
        </div>

        <div class="group relative">
          <input type="password" formControlName="password"
            class="w-full px-4 py-3 bg-black/10 border border-white/10 rounded-xl text-white text-sm focus:outline-none focus:ring-2 focus:ring-white/30 transition-all placeholder:text-white/30"
            placeholder="Password">
          <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            class="text-red-400 text-xs mt-1">
            Password must be at least 6 characters
          </div>
        </div>

        <button type="submit"
          class="w-full py-3.5 mt-3 rounded-xl bg-white text-blue-950 text-sm font-extrabold transition-all hover:bg-blue-50 active:scale-[0.97] shadow-xl hover:shadow-2xl hover:shadow-white/20">
          Authorize Login
        </button>
      </form>

      <div class="mt-6 flex items-center justify-center opacity-40">
        <div class="h-px w-10 bg-white/30"></div>
        <span class="mx-4 text-[10px] uppercase tracking-[0.25em] text-white/60 font-medium">v2.5 // Secure</span>
        <div class="h-px w-10 bg-white/30"></div>
      </div>
    </div>

  </div>
</div>
