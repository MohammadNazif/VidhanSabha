<div class="h-screen p-6 flex flex-col overflow-hidden bg-slate-50">
  <!-- Page Header -->
  <app-page-header title="Designation Management" subtitle="Manage administrative and legislative designations"
    icon="📊">
    <div class="flex gap-3">
      <app-generic-modal-button #designationModal [config]="addDesignationConfig" label="Add Designation" icon="+"
        (formSubmit)="handleFormSubmit($event)">
      </app-generic-modal-button>
    </div>
  </app-page-header>

  <!-- Table Section -->
  <div class="flex-1 min-h-0 mt-6 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
    <app-generic-table class="flex-1 min-h-0" [data]="designationList" [columns]="columns" [config]="config" [actions]="actions"
      (actionClick)="handleAction($event)">
    </app-generic-table>
  </div>
</div>
