<div class="h-screen p-6 flex flex-col overflow-hidden bg-slate-50">
  <app-page-header title="Vidhan Sabha Management" subtitle="Manage legislative constituencies"
    icon="🏛️">
    <div class="flex gap-3">
      <app-generic-modal-button #vidhanModal [config]="addVidhanConfig" label="Add Vidhan Sabha" icon="+"
        (formSubmit)="handleFormSubmit($event)">
      </app-generic-modal-button>
      <app-generic-modal-button #prabhariModal [config]="addPrabhariConfig" label="Assign Prabhari" icon="user"
        [hideButton]="true" (formSubmit)="handlePrabhariSubmit($event)">
      </app-generic-modal-button>
    </div>
  </app-page-header>

  <div class="flex-1 min-h-0 mt-6 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
    <app-generic-table class="flex-1 min-h-0" [data]="vidhanList" [columns]="columns" [config]="config" [actions]="actions"
      (actionClick)="handleAction($event)" *ngIf="vidhanList.length > 0">
    </app-generic-table>
  </div>
</div>
