<div class="h-screen p-6 flex flex-col overflow-hidden bg-slate-50/50">
  <app-page-header [title]="isAsahmatView ? 'Asahmat Voters' : 'Sahmat Voters'" 
    [subtitle]="isAsahmatView ? 'Manage voters who are asahmat' : 'Manage voters who are sahmat'">
    <div class="flex items-center gap-3">
      <app-generic-modal-button *ngIf="canManageVoters()" #voterModal [config]="addVoterConfig" (formSubmit)="handleFormSubmit($event)"
        [label]="isAsahmatView ? 'Add Asahmat Voter' : 'Add Sahmat Voter'" icon="+">
      </app-generic-modal-button>
    </div>
  </app-page-header>

  <div class="flex-1 min-h-0 mt-6 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
    <app-generic-table class="flex-1 min-h-0" [columns]="columns" [data]="voterList" [config]="config" 
      [actions]="actions" [totalItems]="totalCount" (actionClick)="handleAction($event)"
      (pageChange)="handlePageChange($event)"
      (sortChange)="handleSortChange($event)"
      (searchChange)="handleSearchChange($event)"
      (selectionChange)="handleSelection($event)">
    </app-generic-table>
  </div>
</div>
