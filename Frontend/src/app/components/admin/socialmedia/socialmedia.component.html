<div class="h-screen p-6 flex flex-col overflow-hidden bg-slate-50/50">
    <app-page-header [title]="isListView ? 'Social Media List' : 'Social Media Management'"
        subtitle="Create and manage social media posts across multiple platforms.">
        <div class="flex items-center gap-3">
            <app-generic-modal-button #socialMediaModal [config]="addSocialMediaConfig" label="Create Post" icon="+"
                variant="primary" (formSubmit)="handleFormSubmit($event)" *ngIf="canManage()">
            </app-generic-modal-button>

            <app-generic-export [show]="isListView && socialMediaList && socialMediaList.length > 0" 
                [isExporting]="isExporting" (export)="handleExport($event)">
            </app-generic-export>
        </div>
    </app-page-header>

    <!-- Table Section -->
    <div class="flex-1 min-h-0 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
        <app-generic-table class="flex-1 min-h-0" [data]="socialMediaList" [columns]="columns" [config]="config"
            [actions]="actions" [totalItems]="totalCount" [loading]="loading" (actionClick)="handleAction($event)"
            (pageChange)="handlePageChange($event)" (sortChange)="handleSortChange($event)"
            (searchChange)="handleSearchChange($event)">
        </app-generic-table>
    </div>
</div>
