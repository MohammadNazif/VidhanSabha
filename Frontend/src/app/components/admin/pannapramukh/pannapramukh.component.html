<div class="h-screen p-4 flex flex-col overflow-hidden bg-slate-50/50">
    <app-page-header [title]="isListView ? 'Panna Pramukh List' : 'Panna Pramukh Management'" subtitle="Manage panna pramukhs across booths and villages">
        <div class="flex items-center gap-3">
            <app-generic-modal-button *ngIf="canManageVoters()" #pannaModal [config]="addPannaConfig" label="Add Entry" icon="+"
                (formSubmit)="handleFormSubmit($event)" variant="primary">
            </app-generic-modal-button>

            <app-generic-export [show]="isListView && pannaList && pannaList.length > 0" 
                [isExporting]="isExporting" (export)="handleExport($event)">
            </app-generic-export>
        </div>
    </app-page-header>

    <div class="flex-1 min-h-0 mt-4 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
        <app-generic-table class="flex-1 min-h-0" [columns]="columns" [data]="pannaList" [config]="config" 
            [actions]="actions" [totalItems]="totalCount" [loading]="loading" (actionClick)="handleAction($event)"
            (pageChange)="handlePageChange($event)"
            (sortChange)="handleSortChange($event)"
            (searchChange)="handleSearchChange($event)"
            (filterChange)="handleFilterChange($event)"
            (selectionChange)="handleSelection($event)">
        </app-generic-table>
    </div>
</div>
