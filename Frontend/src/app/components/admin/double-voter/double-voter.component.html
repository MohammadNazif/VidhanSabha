<div class="h-screen p-4 flex flex-col overflow-hidden bg-slate-50/50">
    <app-page-header title="Double Voter Management" subtitle="Manage voters registered in multiple locations.">
        <div class="flex items-center gap-3">
            <app-generic-modal-button *ngIf="canManage()" #voterModal [config]="addVoterConfig" label="Add Double Voter" icon="+" variant="primary"
                (formSubmit)="handleFormSubmit($event)">
            </app-generic-modal-button>

            <app-generic-export [show]="isListView && voterList && voterList.length > 0" 
                [isExporting]="isExporting" (export)="handleExport($event)">
            </app-generic-export>
        </div>
    </app-page-header>

    <!-- Table Section -->
    <div class="flex-1 min-h-0 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col mt-4">
        <app-generic-table class="flex-1 min-h-0" [data]="voterList" [columns]="columns" [config]="config" 
            [actions]="actions" [totalItems]="totalCount" [loading]="loading"
            (actionClick)="handleAction($event)" 
            (pageChange)="handlePageChange($event)"
            (sortChange)="handleSortChange($event)"
            (searchChange)="handleSearchChange($event)"
            (filterChange)="handleFilterChange($event)"
            (selectionChange)="handleSelection($event)">
        </app-generic-table>
    </div>
</div>
