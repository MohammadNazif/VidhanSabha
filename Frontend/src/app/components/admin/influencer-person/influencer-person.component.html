<div class="h-screen p-4 flex flex-col overflow-hidden bg-slate-50/50">
    <app-page-header title="Influencer Person Management"
        subtitle="Manage influential people across booths and villages">
        <div class="flex items-center gap-3">
            <app-generic-modal-button *ngIf="canManage()" #influencerModal [config]="formConfig" label="Add Influencer" icon="+"
                (formSubmit)="handleFormSubmit($event)" variant="primary">
            </app-generic-modal-button>

            <app-generic-export [show]="personList && personList.length > 0" [isExporting]="isExporting"
                (export)="handleExport($event)">
            </app-generic-export>
        </div>
    </app-page-header>

    <div
        class="flex-1 min-h-0 mt-4 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
        <app-generic-table class="flex-1 min-h-0" [columns]="columns" [data]="personList" [config]="config"
            [actions]="actions" [totalItems]="totalCount" [loading]="loading" (actionClick)="handleAction($event)"
            (pageChange)="handlePageChange($event)" (sortChange)="handleSortChange($event)"
            (searchChange)="handleSearchChange($event)">
        </app-generic-table>
    </div>
</div>
