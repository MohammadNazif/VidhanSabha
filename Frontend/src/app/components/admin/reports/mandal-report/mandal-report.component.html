<div class="h-screen p-4 flex flex-col overflow-hidden bg-slate-50/50">
  <app-page-header title="Mandal Report" subtitle="High-level statistics for all Mandals">
    <app-generic-export [show]="reportData && reportData.length > 0" [isExporting]="exporting"
      (export)="handleExport($event)">
    </app-generic-export>
  </app-page-header>

  <div class="flex-1 min-h-0 mt-4 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
    <app-generic-table class="flex-1 min-h-0" [data]="reportData" [columns]="columns" [config]="config"
      [loading]="loading" [totalItems]="totalCount" (pageChange)="handlePageChange($event)"
      (searchChange)="handleSearchChange($event)" (filterChange)="handleFilterChange($event)"
      (sortChange)="handleSortChange($event)">

      <ng-template #cellTemplate let-value let-row="row" let-column="column">
        <!-- Clickable Sectors -->
        <ng-container *ngIf="column.key === 'totalSectors'">
          <div class="flex justify-center">
            <div (click)="navigateToSectors(row); $event.stopPropagation()"
              class="inline-flex items-center px-2 py-0.5 rounded-md text-[11px] font-bold bg-indigo-50 text-indigo-700 hover:bg-indigo-600 hover:text-white transition-all cursor-pointer border border-indigo-100 shadow-sm ring-1 ring-indigo-200/30">
              {{ value }}
            </div>
          </div>
        </ng-container>

        <!-- Clickable Booths -->
        <ng-container *ngIf="column.key === 'totalBooths'">
          <div class="flex justify-center">
            <div (click)="navigateToBooths(row); $event.stopPropagation()"
              class="inline-flex items-center px-2 py-0.5 rounded-md text-[11px] font-bold bg-blue-50 text-blue-700 hover:bg-blue-600 hover:text-white transition-all cursor-pointer border border-blue-100 shadow-sm ring-1 ring-blue-200/30">
              {{ value }}
            </div>
          </div>
        </ng-container>

        <!-- Default Cells -->
        <ng-container *ngIf="column.key !== 'totalBooths' && column.key !== 'totalSectors'">
          {{ value }}
        </ng-container>
      </ng-template>

    </app-generic-table>
  </div>
</div>
