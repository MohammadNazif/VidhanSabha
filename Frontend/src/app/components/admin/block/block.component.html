<div class="h-screen p-6 flex flex-col overflow-hidden bg-slate-50/50">
    <app-page-header title="Block Management" subtitle="Manage blocks and block pramukhs.">
        <div class="flex items-center gap-3">
            <app-generic-modal-button *ngIf="canManage()" #blockModal [config]="formConfig" label="Add Block" icon="+" variant="primary"
                (formSubmit)="handleFormSubmit($event)">
            </app-generic-modal-button>
        </div>
    </app-page-header>

    <!-- Table Section -->
    <div class="flex-1 min-h-0 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
        <app-generic-table class="flex-1 min-h-0" [data]="blockList" [columns]="columns" [config]="config" 
            [actions]="actions" [totalItems]="totalCount" [loading]="loading"
            (actionClick)="handleAction($event)" 
            (pageChange)="handlePageChange($event)"
            (sortChange)="handleSortChange($event)"
            (searchChange)="handleSearchChange($event)"
            (selectionChange)="handleSelection($event)">
        </app-generic-table>
    </div>
</div>
