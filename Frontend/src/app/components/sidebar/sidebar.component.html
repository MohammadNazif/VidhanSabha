<aside
  class="fixed left-0 top-0 h-screen z-50 flex flex-col transition-all duration-300 ease-in-out bg-white border-r border-slate-200 shadow-sm"
  [class]="(collapsed && !isMobile) ? 'w-[78px]' : 'w-[260px]'"
  [style.transform]="(isMobile && collapsed) ? 'translateX(-100%)' : 'translateX(0)'"
  [class.shadow-2xl]="isMobile && !collapsed">
  <!-- Logo Section -->
  <div class="flex items-center px-5 py-6 border-b border-slate-100">
    <div class="w-10 h-10 rounded-xl flex items-center justify-center text-xl shadow-sm"
      style="background: linear-gradient(135deg, #1d4ed8, #2563eb);">
      🏛️
    </div>
    <div *ngIf="!collapsed || isMobile" class="ml-3 overflow-hidden transition-all duration-300">
      <h1 class="text-base font-bold text-slate-800 tracking-tight">VidhanSabha</h1>
      <p class="text-[10px] text-blue-600 font-bold tracking-widest uppercase">Legislative Portal</p>
    </div>
    <button (click)="toggleCollapse()"
      class="ml-auto w-7 h-7 rounded-lg flex items-center justify-center text-slate-400 hover:text-slate-700 hover:bg-slate-100 transition-all duration-200 cursor-pointer"
      [class.ml-0]="collapsed && !isMobile" [class.mx-auto]="collapsed && !isMobile"
      [class.mt-2]="collapsed && !isMobile">
      <span class="text-sm transition-transform duration-300"
        [style.transform]="(collapsed && !isMobile) ? 'rotate(180deg)' : ''">◀</span>
    </button>
  </div>

  <!-- Search -->
  <div *ngIf="!collapsed || isMobile" class="px-4 py-3">
    <div class="relative">
      <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">🔍</span>
      <input type="text" placeholder="Search menu..." (input)="onSearch($event)"
        class="w-full bg-slate-50 border border-slate-200 rounded-lg pl-9 pr-3 py-2 text-sm text-slate-700 placeholder-slate-400 focus:outline-none focus:border-blue-500/50 focus:bg-white focus:ring-2 focus:ring-blue-500/20 transition-all duration-200" />
    </div>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 px-3 py-2 overflow-y-auto">
    <p *ngIf="!collapsed || isMobile" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-3 mb-2">
      Main Menu</p>
    <ul class="space-y-1">
      <li *ngFor="let item of renderedNavItems; let i = index" class="flex flex-col">
        <a [routerLink]="item.children ? null : item.route"
          [routerLinkActive]="item.children ? '' : 'bg-blue-50 text-blue-700'"
          [routerLinkActiveOptions]="item.children ? {exact: false} : {exact: item.route === '/'}"
          (click)="item.children ? toggleSubmenu(item, $event) : null"
          class="group flex items-center gap-2.5 px-3 py-1.5 rounded-xl text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-slate-50 transition-all duration-200 relative cursor-pointer"
          [class.justify-center]="collapsed" [class.bg-slate-50]="item.expanded" [class.text-blue-700]="item.expanded">
          <span class="flex-shrink-0 group-hover:scale-110 transition-transform duration-200">
            <lucide-icon [name]="item.icon" [size]="20" [strokeWidth]="2"></lucide-icon>
          </span>
          <span *ngIf="!collapsed || isMobile" class="truncate">{{ item.label }}</span>

          <span *ngIf="item.badge && (!collapsed || isMobile) && !item.children"
            class="ml-auto text-[10px] font-bold px-2 py-0.5 rounded-full bg-orange-100 text-orange-700 border border-orange-200">
            {{ item.badge }}
          </span>

          <!-- Chevron for Submenu -->
          <span *ngIf="item.children && (!collapsed || isMobile)"
            class="ml-auto text-xs transition-transform duration-200 text-slate-400 group-hover:text-slate-700"
            [style.transform]="item.expanded ? 'rotate(90deg)' : ''">
            ▶
          </span>

          <!-- Tooltip for collapsed -->
          <span *ngIf="collapsed && !isMobile"
            class="absolute left-full ml-3 px-2 py-1 rounded-md text-xs font-medium text-white bg-slate-800 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 whitespace-nowrap z-50 shadow-xl">
            {{ item.label }}
          </span>
        </a>

        <!-- Submenu Container -->
        <div *ngIf="item.children && item.expanded && (!collapsed || isMobile)"
          class="overflow-hidden transition-all duration-300 ease-in-out">
          <ul class="space-y-1 mt-1 mb-2 border-l border-slate-200 ml-[26px] pl-[10px]">
            <li *ngFor="let child of item.children">
              <a [routerLink]="child.route" routerLinkActive="text-blue-700 bg-blue-50/70 font-semibold"
                class="block px-3 py-1 rounded-lg text-[13px] font-medium text-slate-500 hover:text-slate-900 hover:bg-slate-50 transition-all duration-200">
                {{ child.label }}
              </a>
            </li>
          </ul>
        </div>
      </li>
    </ul>
  </nav>

  <!-- Bottom Navigation -->
  <div class="px-3 py-4 border-t border-slate-100">
    <!-- Empty space where bottom nav items used to be -->

    <!-- User Profile & Settings Menu -->
    <div class="mt-3 relative" (click)="toggleProfileMenu()">
      <div
        class="flex items-center gap-3 px-3 py-2 rounded-xl bg-slate-50 border border-slate-200 cursor-pointer hover:bg-slate-100 transition-all duration-200"
        [class.justify-center]="collapsed && !isMobile">
        <div
          class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold text-white flex-shrink-0 shadow-sm"
          style="background: linear-gradient(135deg, #f97316, #ea580c);">
          A
        </div>
        <div *ngIf="!collapsed || isMobile" class="flex-1 min-w-0 pointer-events-none">
          <p class="text-sm font-bold text-slate-800 truncate">Admin User</p>
          <p class="text-[10px] text-slate-500 font-medium">admin&#64;vidhansabha.gov</p>
        </div>

        <span *ngIf="!collapsed || isMobile"
          class="text-slate-400 text-xs font-bold transition-transform duration-200 pointer-events-none"
          [style.transform]="profileMenuOpen ? 'rotate(180deg)' : ''">
          ▼
        </span>
      </div>

      <!-- Flyout Logout Menu (Glassmorphism) -->
      <div *ngIf="profileMenuOpen && (!collapsed || isMobile)"
        class="absolute bottom-[110%] mb-2 left-0 w-full bg-white/60 backdrop-blur-xl rounded-2xl shadow-[0_8px_32px_rgba(0,0,0,0.08)] border border-white/60 overflow-hidden z-50 transition-all duration-200 transform origin-bottom ring-1 ring-slate-200">
        <div class="p-1.5">
          <button
            class="group w-full text-left px-3 py-2.5 rounded-xl text-sm font-bold text-slate-700 hover:text-red-700 hover:bg-white/80 hover:shadow-sm flex items-center gap-3 transition-all duration-200"
            (click)="onLogout($event)">
            <span
              class="flex items-center justify-center w-8 h-8 rounded-lg bg-red-50 text-red-500 group-hover:bg-red-100 group-hover:text-red-600 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
              </svg>
            </span>
            Sign out
          </button>
        </div>
      </div>
    </div>
  </div>
</aside>
